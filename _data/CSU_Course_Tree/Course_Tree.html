<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSU Course Code Tree</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 20px;
    }
    #chart {
      overflow-x: auto;
    }
    svg {
      display: block;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .link {
      fill: none;
      stroke: #7b8fa3;
      stroke-opacity: 0.8;
      stroke-width: 1.2;
    }
    .node circle {
      stroke: #333;
      stroke-width: 1.2;
    }
    .node text {
      font-size: 11px;
      fill: #223;
      paint-order: stroke;
      stroke: white;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div style="margin-bottom: 12px;">
    <label for="topicSelect" style="font-weight: bold; margin-right: 8px;">Select topic:</label>
    <select id="topicSelect"></select>
  </div>
  <div id="chart"></div>
  <script src="Course_Tree.js"></script>
</body>
</html>
